<!DOCTYPE html>
<html>
<head>
  <title>VTU Hub Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 20px; }
    input, select, button { margin: 5px 0; padding: 5px; width: 100%; }
    .section { border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
    h2 { margin-top: 0; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

  <h1>VTU Hub Dashboard</h1>

  <!-- Register -->
  <div class="section">
    <h2>Register</h2>
    <input type="text" id="regName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="text" id="regPhone" placeholder="Phone">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="registerUser()">Register</button>
    <pre id="regResult"></pre>
  </div>

  <!-- Login -->
  <div class="section">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="loginUser()">Login</button>
    <pre id="loginResult"></pre>
  </div>

  <!-- Balance -->
  <div class="section">
    <h2>Balance</h2>
    <input type="text" id="balanceUserId" placeholder="User ID">
    <button onclick="checkBalance()">Check Balance</button>
    <pre id="balanceResult"></pre>
  </div>

  <!-- Buy Airtime -->
  <div class="section">
    <h2>Buy Airtime</h2>
    <input type="text" id="airtimeUserId" placeholder="User ID">
    <select id="airtimeNetwork">
      <option>MTN</option>
      <option>Glo</option>
      <option>Airtel</option>
      <option>9mobile</option>
    </select>
    <input type="number" id="airtimeAmount" placeholder="Amount">
    <input type="text" id="airtimePhone" placeholder="Phone Number">
    <button onclick="buyAirtime()">Buy Airtime</button>
    <pre id="airtimeResult"></pre>
  </div>

  <!-- Buy Data -->
  <div class="section">
    <h2>Buy Data</h2>
    <input type="text" id="dataUserId" placeholder="User ID">
    <select id="dataNetwork">
      <option>MTN</option>
      <option>Glo</option>
      <option>Airtel</option>
      <option>9mobile</option>
    </select>
    <select id="dataPlan">
      <option>500MB</option>
      <option>1GB</option>
      <option>2GB</option>
    </select>
    <input type="text" id="dataPhone" placeholder="Phone Number">
    <button onclick="buyData()">Buy Data</button>
    <pre id="dataResult"></pre>
  </div>

  <!-- JS -->
  <script>
    const BASE_URL = "https://vtu-hub-sigma.vercel.app/api";

    async function registerUser() {
      const res = await fetch(`${BASE_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          phone: document.getElementById('regPhone').value,
          password: document.getElementById('regPassword').value
        })
      });
      const data = await res.json();
      document.getElementById('regResult').innerText = JSON.stringify(data, null, 2);
    }

    async function loginUser() {
      const res = await fetch(`${BASE_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      document.getElementById('loginResult').innerText = JSON.stringify(data, null, 2);
    }

    async function checkBalance() {
      const userId = document.getElementById('balanceUserId').value;
      const res = await fetch(`${BASE_URL}/balance/${userId}`);
      const data = await res.json();
      document.getElementById('balanceResult').innerText = JSON.stringify(data, null, 2);
    }

    async function buyAirtime() {
      const res = await fetch(`${BASE_URL}/buy-airtime`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: document.getElementById('airtimeUserId').value,
          network: document.getElementById('airtimeNetwork').value,
          amount: Number(document.getElementById('airtimeAmount').value),
          phone: document.getElementById('airtimePhone').value
        })
      });
      const data = await res.json();
      document.getElementById('airtimeResult').innerText = JSON.stringify(data, null, 2);
    }

    async function buyData() {
      const res = await fetch(`${BASE_URL}/buy-data`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: document.getElementById('dataUserId').value,
          network: document.getElementById('dataNetwork').value,
          plan: document.getElementById('dataPlan').value,
          phone: document.getElementById('dataPhone').value
        })
      });
      const data = await res.json();
      document.getElementById('dataResult').innerText = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
